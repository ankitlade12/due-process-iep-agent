<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">Due Process Track 4 architecture</title>
  <desc id="desc">A parent or advocate uses a Streamlit case desk. Inputs pass through a privacy gate to bounded Qwen language tasks, human confirmation, deterministic analysis, an evidence publication gate, and final human approval. The packet can be downloaded, while optional approved storage uses Alibaba Function Compute and OSS. Function Compute also exposes the deployed Qwen-backed synthetic and authenticated custom-case API.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#395b64"/>
    </marker>
    <marker id="arrowAccent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
    <style>
      .title { font: 700 34px Inter, Arial, sans-serif; fill: #16252c; }
      .subtitle { font: 400 17px Inter, Arial, sans-serif; fill: #506068; }
      .box-title { font: 700 17px Inter, Arial, sans-serif; fill: #17252c; }
      .box-copy { font: 400 13px Inter, Arial, sans-serif; fill: #42545d; }
      .label { font: 600 12px Inter, Arial, sans-serif; fill: #7c3f00; }
      .lane { font: 700 13px Inter, Arial, sans-serif; letter-spacing: 1px; fill: #65747b; }
      .flow { stroke: #395b64; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .optional { stroke: #b45309; stroke-width: 3; stroke-dasharray: 9 7; fill: none; marker-end: url(#arrowAccent); }
    </style>
  </defs>

  <rect width="1440" height="760" rx="28" fill="#f7f2e9"/>
  <text x="60" y="62" class="title">Due Process · evidence-backed IEP service-delivery review</text>
  <text x="60" y="93" class="subtitle">Qwen interprets ambiguity. Deterministic code handles consequences. A human controls action.</text>

  <text x="60" y="142" class="lane">JUDGE-FACING WORKFLOW</text>

  <g transform="translate(60 170)">
    <rect width="180" height="112" rx="16" fill="#ffffff" stroke="#b7c2c7" stroke-width="2"/>
    <text x="90" y="35" text-anchor="middle" class="box-title">Parent / advocate</text>
    <text x="90" y="61" text-anchor="middle" class="box-copy">Synthetic or already</text>
    <text x="90" y="81" text-anchor="middle" class="box-copy">de-identified records</text>
  </g>

  <path d="M240 226 H290" class="flow"/>

  <g transform="translate(290 170)">
    <rect width="190" height="112" rx="16" fill="#ffffff" stroke="#b7c2c7" stroke-width="2"/>
    <text x="95" y="35" text-anchor="middle" class="box-title">Streamlit case desk</text>
    <text x="95" y="61" text-anchor="middle" class="box-copy">Upload · inspect</text>
    <text x="95" y="81" text-anchor="middle" class="box-copy">edit · approve</text>
  </g>

  <path d="M480 226 H530" class="flow"/>

  <g transform="translate(530 170)">
    <rect width="180" height="112" rx="16" fill="#eef5f3" stroke="#6e9188" stroke-width="2"/>
    <text x="90" y="35" text-anchor="middle" class="box-title">Privacy gate</text>
    <text x="90" y="61" text-anchor="middle" class="box-copy">Attestation + known</text>
    <text x="90" y="81" text-anchor="middle" class="box-copy">identifier redaction</text>
  </g>

  <path d="M710 226 H760" class="flow"/>

  <g transform="translate(760 150)">
    <rect width="220" height="152" rx="18" fill="#fff6df" stroke="#c88a21" stroke-width="2.5"/>
    <text x="110" y="37" text-anchor="middle" class="box-title">Qwen Cloud</text>
    <text x="110" y="66" text-anchor="middle" class="box-copy">Extract commitments</text>
    <text x="110" y="88" text-anchor="middle" class="box-copy">Classify narrative reasons</text>
    <text x="110" y="110" text-anchor="middle" class="box-copy">Draft bounded prose</text>
    <text x="110" y="132" text-anchor="middle" class="box-copy">Report actual call provenance</text>
  </g>

  <path d="M980 226 H1030" class="flow"/>

  <g transform="translate(1030 170)">
    <rect width="180" height="112" rx="16" fill="#fceae4" stroke="#b96f5c" stroke-width="2"/>
    <text x="90" y="35" text-anchor="middle" class="box-title">Human checkpoint</text>
    <text x="90" y="61" text-anchor="middle" class="box-copy">Confirm extraction</text>
    <text x="90" y="81" text-anchor="middle" class="box-copy">Resolve ambiguity</text>
  </g>

  <path d="M1210 226 H1260" class="flow"/>

  <g transform="translate(1260 170)">
    <rect width="130" height="112" rx="16" fill="#e9f0f7" stroke="#637f9d" stroke-width="2"/>
    <text x="65" y="35" text-anchor="middle" class="box-title">Confirmed</text>
    <text x="65" y="61" text-anchor="middle" class="box-copy">structured</text>
    <text x="65" y="81" text-anchor="middle" class="box-copy">inputs</text>
  </g>

  <path d="M1325 282 V330 H415 V370" class="flow"/>

  <g transform="translate(290 370)">
    <rect width="250" height="142" rx="18" fill="#e9f0f7" stroke="#637f9d" stroke-width="2.5"/>
    <text x="125" y="36" text-anchor="middle" class="box-title">Deterministic core</text>
    <text x="125" y="66" text-anchor="middle" class="box-copy">Promised vs. recorded minutes</text>
    <text x="125" y="88" text-anchor="middle" class="box-copy">Review policy · make-ups</text>
    <text x="125" y="110" text-anchor="middle" class="box-copy">Deadline indicators</text>
  </g>

  <path d="M540 441 H610" class="flow"/>

  <g transform="translate(610 370)">
    <rect width="230" height="142" rx="18" fill="#eef5f3" stroke="#6e9188" stroke-width="2.5"/>
    <text x="115" y="36" text-anchor="middle" class="box-title">Evidence publication gate</text>
    <text x="115" y="66" text-anchor="middle" class="box-copy">IEP source + exact log IDs</text>
    <text x="115" y="88" text-anchor="middle" class="box-copy">Controlled authority IDs</text>
    <text x="115" y="110" text-anchor="middle" class="box-copy">Reject incomplete claims</text>
  </g>

  <path d="M840 441 H910" class="flow"/>

  <g transform="translate(910 370)">
    <rect width="210" height="142" rx="18" fill="#fceae4" stroke="#b96f5c" stroke-width="2.5"/>
    <text x="105" y="36" text-anchor="middle" class="box-title">Final human approval</text>
    <text x="105" y="66" text-anchor="middle" class="box-copy">Review packet and evidence</text>
    <text x="105" y="88" text-anchor="middle" class="box-copy">No inferred permission</text>
    <text x="105" y="110" text-anchor="middle" class="box-copy">No automatic filing</text>
  </g>

  <path d="M1120 421 H1190" class="flow"/>
  <g transform="translate(1190 370)">
    <rect width="200" height="102" rx="16" fill="#ffffff" stroke="#6e9188" stroke-width="2"/>
    <text x="100" y="37" text-anchor="middle" class="box-title">Review packet</text>
    <text x="100" y="65" text-anchor="middle" class="box-copy">Download + inspect</text>
  </g>

  <path d="M1015 512 V600 H870" class="optional"/>
  <text x="925" y="583" class="label">OPTIONAL APPROVED STORAGE</text>

  <g transform="translate(580 620)">
    <rect width="290" height="90" rx="16" fill="#fff6df" stroke="#c88a21" stroke-width="2.5"/>
    <text x="145" y="34" text-anchor="middle" class="box-title">Alibaba Function Compute</text>
    <text x="145" y="60" text-anchor="middle" class="box-copy">Deployed Qwen API + authenticated action boundary</text>
  </g>

  <path d="M580 665 H510" class="optional"/>
  <g transform="translate(270 620)">
    <rect width="240" height="90" rx="16" fill="#ffffff" stroke="#c88a21" stroke-width="2" stroke-dasharray="8 6"/>
    <text x="120" y="34" text-anchor="middle" class="box-title">Alibaba OSS · optional</text>
    <text x="120" y="60" text-anchor="middle" class="box-copy">Content-addressed packet + SHA-256</text>
  </g>

  <path d="M870 665 H1190" class="optional"/>
  <g transform="translate(1190 620)">
    <rect width="200" height="90" rx="16" fill="#ffffff" stroke="#c88a21" stroke-width="2" stroke-dasharray="8 6"/>
    <text x="100" y="34" text-anchor="middle" class="box-title">Audit receipt</text>
    <text x="100" y="60" text-anchor="middle" class="box-copy">URI · hash · request ID</text>
  </g>

  <text x="60" y="735" class="box-copy">Solid arrows: required workflow · Dashed amber arrows: optional approved storage path</text>
</svg>
