name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Compile
        run: python -m compileall -q src tests
      - name: Test
        env:
          DASHSCOPE_API_KEY: ""
        run: pytest
      - name: Reproduce offline evaluation
        env:
          DASHSCOPE_API_KEY: ""
        run: python -m due_process.evaluation.run_eval --offline --json
