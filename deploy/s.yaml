# Serverless Devs (v3) — deploy Due Process to Alibaba Cloud Function Compute.
#
#   npm install -g @serverless-devs/s
#   s config add            # add your Alibaba Cloud AccessKey (alias: default)
#   export DASHSCOPE_API_KEY=...      # rotated Qwen Cloud key
#   export DUE_PROCESS_API_TOKEN=...  # long random Bearer token for custom cases
#   ./build.sh              # bundle the due_process package + openai into ./dist
#   s deploy
#   s invoke                # runs the worked example; or: s invoke -e '{...}'
#
# Empty unauthenticated requests run the synthetic demo. Custom-case requests
# require the Bearer token. Optional OSS storage additionally requires the four
# DUE_PROCESS_OSS_* variables and an explicit approval flag in the request.

edition: 3.0.0
name: due-process-iep-agent
access: default

vars:
  region: ap-southeast-1   # Singapore — Qwen Cloud / Model Studio primary region

resources:
  due-process-agent:
    component: fc3
    props:
      region: ${vars.region}
      functionName: due-process-agent
      description: IEP enforcement agent — invokes Qwen Cloud Model Studio
      runtime: python3.10
      handler: handler.handler
      timeout: 300
      cpu: 0.5
      memorySize: 1024
      diskSize: 512
      code: ./dist
      environmentVariables:
        DASHSCOPE_API_KEY: ${env.DASHSCOPE_API_KEY}
        DUE_PROCESS_API_TOKEN: ${env.DUE_PROCESS_API_TOKEN}
        # qwen3.7-plus everywhere in the deployed function: fast and reliable
        # within the request timeout (qwen3.7-max reasoning latency can exceed it).
        DUE_PROCESS_ORCHESTRATOR_MODEL: qwen3.7-plus
        DUE_PROCESS_WORKHORSE_MODEL: qwen3.7-plus
        DUE_PROCESS_OSS_BUCKET: ${env.DUE_PROCESS_OSS_BUCKET}
        DUE_PROCESS_OSS_ENDPOINT: ${env.DUE_PROCESS_OSS_ENDPOINT}
        DUE_PROCESS_OSS_ACCESS_KEY_ID: ${env.DUE_PROCESS_OSS_ACCESS_KEY_ID}
        DUE_PROCESS_OSS_ACCESS_KEY_SECRET: ${env.DUE_PROCESS_OSS_ACCESS_KEY_SECRET}
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
